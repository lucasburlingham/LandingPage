<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            /* footer background can be customized by overriding this variable */
            --footer-bg-color: #f8f9fa;
        }

        .card.draggable {
            cursor: move;
        }
        .card.clickable {
            cursor: pointer;
        }

        /* style applied while a card is being dragged */
        .card.dragging {
            border: 2px dashed #444;               /* hand‑drawn look */
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            background: #fff;
            opacity: 0.8;                          /* a little transparent */
        }

        /* highlight potential drop targets on cards */
        .card.drop-target {
            outline: 2px dashed #007bff;
            transform: scale(1.03);
            transition: transform 0.1s ease-in-out;
            box-shadow: 0 12px 24px rgba(0,0,0,0.35);
            z-index: 5; /* sit above neighbors */
        }

        /* column drop target provides a bigger hit area */
        .col-12.drop-target,
        .col-sm-6.drop-target,
        .col-md-4.drop-target,
        .col-lg-3.drop-target {
            outline: 3px dashed #007bff;
            background: rgba(0,123,255,0.05);
        }

        .card-placeholder {
            border: 2px dashed #bbb;
            margin: .5rem;
            height: 120px;
        }

        /* limit card width so they appear smaller */
        .card {
            max-width: 18rem;
            margin: 0 auto;
        }

        /* ensure images on cards remain square and cover the area */
        .card-img-top {
            width: 100%;
			height: auto;
            /* aspect-ratio: 1 / 1; */
            object-fit: cover;
        }

        /* simple footer styling using CSS variable */
        .custom-footer {
            background-color: var(--footer-bg-color);
            padding: 1rem 0;
            text-align: center;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 1030; /* above default content */
        }

        /* ensure content doesn't sit behind the fixed footer */
        body {
            padding-bottom: 4rem; /* slightly larger than footer height */
        }

        /* styles for export link in footer */
        .custom-footer .export-link {
            color: grey;
            text-decoration: none;
            border-bottom: 1px dotted grey;
            background: none;
            border: none;
            cursor: pointer;
            font: inherit;
            padding: 0;
        }
        .custom-footer .export-link:hover {
            color: #555;
            border-bottom-color: #555;
        }
    </style>
</head>
<body>
    <!-- navigation bar with branding opportunity -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">BrandName</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">About</a></li>
                    <!-- add more links as needed -->
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h1 class="mb-4">My Dashboard</h1>
        <div id="cards-container" class="row g-3">
            <!-- cards injected here -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- simple footer at the bottom; change --footer-bg-color in :root to customize -->
    <footer class="custom-footer text-muted">
        &copy; 2026 Your Company. <a href="#" class="text-reset">Learn more</a>
        <!-- export order link centered in footer -->
        <br>
        <a href="#" id="export-link" class="export-link">Export order</a>
        <button id="upload-btn" class="export-link" style="margin-left:1rem;">Upload order</button>
        <button id="reset-btn" class="export-link" style="margin-left:1rem;">Reset order</button>
        <input type="file" id="upload-input" accept="application/json" style="display:none">
    </footer>

    <script>
        // helper handlers for drop-target highlighting
        function dragEnter(e) {
            e.preventDefault();
            if (this === draggingEl) return;
            // if this is a column but the mouse is over a child (likely a card), skip
            if (this.classList.contains('col-12') || this.classList.contains('col-sm-6') ||
                this.classList.contains('col-md-4') || this.classList.contains('col-lg-3')) {
                if (e.target !== this) {
                    // ignore events from inside child elements so the card highlights instead
                    return;
                }
            }
            this.classList.add('drop-target');
            // if a card is highlighted, clear its column so only one shape shows
            if (this.classList.contains('card')) {
                const col = this.parentElement;
                if (col) col.classList.remove('drop-target');
            }
        }

        function dragLeave(e) {
            if (this !== draggingEl) {
                this.classList.remove('drop-target');
            }
        }

        // sample default cards with image URLs
        const defaultCards = [
            {id: 'card1', title: 'Dashboard', desc: 'Go to dashboard', url: '#dashboard', img: 'https://placehold.net/400x400.png?text=Dashboard'},
            {id: 'card2', title: 'Profile', desc: 'View your profile', url: '#profile', img: 'https://placehold.net/400x400.png?text=Profile'},
            {id: 'card3', title: 'Settings', desc: 'Application settings', url: '#settings', img: 'https://placehold.net/400x400.png?text=Settings'},
            {id: 'card4', title: 'Reports', desc: 'View reports', url: '#reports', img: 'https://placehold.net/400x400.png?text=Reports'},
            {id: 'card5', title: 'Analytics', desc: 'See analytics', url: '#analytics', img: 'https://placehold.net/400x400.png?text=Analytics'},
            {id: 'card6', title: 'Messages', desc: 'Check messages', url: '#messages', img: 'https://placehold.net/400x400.png?text=Messages'},
            {id: 'card7', title: 'Notifications', desc: 'View notifications', url: '#notifications', img: 'https://placehold.net/400x400.png?text=Notifications'},
            {id: 'card8', title: 'Help', desc: 'Get help', url: '#help', img: 'https://placehold.net/400x400.png?text=Help'},
            {id: 'card9', title: 'Support', desc: 'Contact support', url: '#support', img: 'https://placehold.net/400x400.png?text=Support'},
            {id: 'card10', title: 'Feedback', desc: 'Leave feedback', url: '#feedback', img: 'https://placehold.net/400x400.png?text=Feedback'},
            {id: 'card11', title: 'Blog', desc: 'Read our blog', url: '#blog', img: 'https://placehold.net/400x400.png?text=Blog'},
            {id: 'card12', title: 'Store', desc: 'Visit our store', url: '#store', img: 'https://placehold.net/400x400.png?text=Store'},
            {id: 'card13', title: 'Events', desc: 'Upcoming events', url: '#events', img: 'https://placehold.net/400x400.png?text=Events'}
        ];

        const container = document.getElementById('cards-container');

        function saveOrder() {
            // grab the actual cards, not their parent columns, since the columns
            // are what we move around but they don’t carry the id we care about
            const order = Array.from(container.querySelectorAll('.card')).map(c => c.id);
            localStorage.setItem('cardOrder', JSON.stringify(order));
        }

        function loadOrder() {
            const saved = localStorage.getItem('cardOrder');
            if (saved) {
                try {
                    return JSON.parse(saved);
                } catch (e) {
                    console.error('invalid order in storage');
                }
            }
            return null;
        }

        function renderCards(list) {
            container.innerHTML = '';
            list.forEach(item => {
                const col = document.createElement('div');
                // add an extra breakpoint so more cards fit on larger screens
                col.className = 'col-12 col-sm-6 col-md-4 col-lg-3';
                const card = document.createElement('div');
                card.className = 'card p-3 draggable clickable';
                card.id = item.id;
                card.setAttribute('draggable', 'true');
                card.dataset.url = item.url;
                let inner = '';
                if (item.img) {
                    inner += `<img src="${item.img}" width="300" height="300" class="card-img-top mb-2" alt="${item.title}">`;
                }
                inner += `<h5 class="card-title">${item.title}</h5><p class="card-text">${item.desc}</p>`;
                card.innerHTML = inner;
                col.appendChild(card);
                container.appendChild(col);
                // attach handlers to both card and its parent column
                attachDragHandlers(card);
                attachColumnDropZone(col);
                card.addEventListener('click', () => {
                    window.location.href = card.dataset.url;
                });
            });
        }

        function attachDragHandlers(el) {
            el.addEventListener('dragstart', dragStart);
            el.addEventListener('dragenter', dragEnter);
            el.addEventListener('dragover', dragOver);
            el.addEventListener('dragleave', dragLeave);
            el.addEventListener('drop', dragDrop);
            el.addEventListener('dragend', dragEnd);
        }

        // columns themselves can act as generous drop targets without starting a drag
        function attachColumnDropZone(col) {
            col.addEventListener('dragenter', dragEnter);
            col.addEventListener('dragover', dragOver);
            col.addEventListener('dragleave', dragLeave);
            col.addEventListener('drop', dragDrop);
        }

        let draggingEl = null;

        function dragStart(e) {
            draggingEl = this;
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', this.id);
            this.classList.add('opacity-50', 'dragging');
            // clear any stray highlights before drag begins
            container.querySelectorAll('.drop-target').forEach(el => el.classList.remove('drop-target'));
            // start random-direction jiggle
            startJiggle();
        }

        function dragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        }

        function dragDrop(e) {
            e.stopPropagation();
            // cleanup any hover highlights on the target
            this.classList.remove('drop-target');
            const draggedId = e.dataTransfer.getData('text/plain');
            const dragged = document.getElementById(draggedId);
            if (dragged && dragged !== this) {
                // figure out column context: if drop on a card, use its parent; if on a col, use it directly
                const draggedCol = dragged.parentElement;
                const targetCol = this.classList.contains('col-12') ? this : this.parentElement;

                const swapNodes = (a, b) => {
                    const parent = a.parentNode;
                    const siblingA = a.nextSibling;
                    const siblingB = b.nextSibling;
                    parent.insertBefore(a, siblingB);
                    parent.insertBefore(b, siblingA);
                };

                if (targetCol && targetCol !== draggedCol) {
                    swapNodes(draggedCol, targetCol);
                    saveOrder();
                }
            }
            return false;
        }

        function dragEnd(e) {
            this.classList.remove('opacity-50', 'dragging');
            // remove any lingering drop targets
            container.querySelectorAll('.drop-target').forEach(el => el.classList.remove('drop-target'));
        }


        // initialize on load
        // export the current card order from localStorage as a JSON file
        function exportOrder() {
            const order = localStorage.getItem('cardOrder') || '[]';
            try {
                const blob = new Blob([order], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'order.json';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } catch (e) {
                console.error('export failed', e);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const order = loadOrder();
            let list = defaultCards.slice();
            if (order) {
                // reorder list according to saved order
                const map = new Map(list.map(i => [i.id, i]));
                const ordered = [];
                order.forEach(id => {
                    if (map.has(id)) ordered.push(map.get(id));
                });
                // append any that were not in storage
                list.forEach(i => { if (!order.includes(i.id)) ordered.push(i); });
                list = ordered;
            }
            renderCards(list);

            // hook up export link
            const exp = document.getElementById('export-link');
            if (exp) {
                exp.addEventListener('click', function(e) {
                    e.preventDefault();
                    exportOrder();
                });
            }

            // upload support
            const uploadBtn = document.getElementById('upload-btn');
            const uploadInput = document.getElementById('upload-input');
            if (uploadBtn && uploadInput) {
                uploadBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    uploadInput.click();
                });
                uploadInput.addEventListener('change', function() {
                    const file = this.files && this.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = function(evt) {
                        try {
                            const text = evt.target.result;
                            const parsed = JSON.parse(text);
                            if (Array.isArray(parsed)) {
                                localStorage.setItem('cardOrder', JSON.stringify(parsed));
                                // reload to apply new order
                                window.location.reload();
                            } else {
                                alert('Invalid format; expected an array');
                            }
                        } catch (err) {
                            alert('Failed to parse JSON: ' + err.message);
                        }
                    };
                    reader.readAsText(file);
                });
            }

            // reset support
            const resetBtn = document.getElementById('reset-btn');
            if (resetBtn) {
                resetBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    if (confirm('Are you sure you want to reset order?')) {
                        localStorage.removeItem('cardOrder');
                        window.location.reload();
                    }
                });
            }
        });
    </script>
</body>
</html>
